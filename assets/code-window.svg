s="o"> w </tspan><tspan class="k">in</tspan><tspan class="o"> workers </tspan><tspan class="k">if</tspan><tspan class="o"> w.online]</tspan></text><rect x="176" y="302" width="900" height="34" class="mask" style="animation-delay:-4.48s"/><text x="176" y="396" class="c"><tspan class="o">result = await </tspan><tspan class="f">gather</tspan><tspan class="o">(*(w.run(queue) </tspan><tspan class="k">for</tspan><tspan class="o"> w </tspan><tspan class="k">in</tspan><tspan class="o"> active))</tspan></text><rect x="176" y="372" width="900" height="34" class="mask" style="animation-delay:-4.84s"/><text x="176" y="466" class="c"><tspan class="o">await </tspan><tspan class="f">publish_event</tspan><tspan class="o">(</tspan><tspan class="s">"pipeline.synced"</tspan><tspan class="o">, {</tspan><tspan class="s">"count"</tspan><tspan class="o">: </tspan><tspan class="f">len</tspan><tspan class="o">(active)})</tspan></text><rect x="176" y="442" width="900" height="34" class="mask" style="animation-delay:-5.2s"/></g><g class="panel p3"><text x="1068" y="256" text-anchor="end" class="l">TYPESCRIPT</text><text x="176" y="256" class="c"><tspan class="k">type</tspan><tspan class="o"> Particle = { x: </tspan><tspan class="y">number</tspan><tspan class="o">; y: </tspan><tspan class="y">number</tspan><tspan class="o">; r: </tspan><tspan class="y">number</tspan><tspan class="o"> }</tspan></text><rect x="176" y="232" width="900" height="34" class="mask" style="animation-delay:-8.12s"/><text x="176" y="326" class="c"><tspan class="k">const</tspan><tspan class="o"> particles = Array.from({ length: </tspan><tspan class="m">48</tspan><tspan class="o"> }, seed)</tspan></text><rect x="176" y="302" width="900" height="34" class="mask" style="animation-delay:-8.48s"/><text x="176" y="396" class="c"><tspan class="k">function</tspan><tspan class="o"> </tspan><tspan class="f">tick</tspan><tspan class="o">(){ particles.forEach(updateParticle) }</tspan></text><rect x="176" y="372" width="900" height="3