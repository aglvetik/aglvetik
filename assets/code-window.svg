<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b0d12"/>
      <stop offset="1" stop-color="#121722"/>
    </linearGradient>

    <linearGradient id="bar" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171b24"/>
      <stop offset="1" stop-color="#11161f"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <style>
      .title {
        font: 700 28px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #f7ece7;
      }

      .lang {
        font: 700 20px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #ffdcd2;
        letter-spacing: 1px;
      }

      .line-no {
        font: 18px 'JetBrains Mono', Consolas, monospace;
        fill: #666f7c;
      }

      .code {
        font: 23px 'JetBrains Mono', 'Fira Code', Consolas, monospace;
        fill: #f7f1ed;
      }

      .kw  { fill: #ffb7c8; }
      .fn  { fill: #ffd9a8; }
      .str { fill: #f7e7a8; }
      .num { fill: #d9c5ff; }
      .typ { fill: #b7e6ff; }
      .cm  { fill: #788394; }
      .op  { fill: #f7f1ed; }

      .panel { opacity: 0; }

      .p1 { animation: panel1 20s infinite; }
      .p2 { animation: panel2 20s infinite; }
      .p3 { animation: panel3 20s infinite; }
      .p4 { animation: panel4 20s infinite; }
      .p5 { animation: panel5 20s infinite; }

      @keyframes panel1 {
        0%, 19.8% { opacity: 1; }
        20%, 100% { opacity: 0; }
      }
      @keyframes panel2 {
        0%, 20% { opacity: 0; }
        20.2%, 39.8% { opacity: 1; }
        40%, 100% { opacity: 0; }
      }
      @keyframes panel3 {
        0%, 40% { opacity: 0; }
        40.2%, 59.8% { opacity: 1; }
        60%, 100% { opacity: 0; }
      }
      @keyframes panel4 {
        0%, 60% { opacity: 0; }
        60.2%, 79.8% { opacity: 1; }
        80%, 100% { opacity: 0; }
      }
      @keyframes panel5 {
        0%, 80% { opacity: 0; }
        80.2%, 99.8% { opacity: 1; }
        100% { opacity: 0; }
      }

      .cursor {
        animation: blink 0.85s step-end infinite;
      }

      @keyframes blink {
        50% { opacity: 0; }
      }

      .typing rect {
        width: 0;
      }

      .p1 .typing rect { animation: type1 20s infinite; }
      .p2 .typing rect { animation: type2 20s infinite; }
      .p3 .typing rect { animation: type3 20s infinite; }
      .p4 .typing rect { animation: type4 20s infinite; }
      .p5 .typing rect { animation: type5 20s infinite; }

      @keyframes type1 {
        0%   { width: 0; }
        14%  { width: 760px; }
        19.8% { width: 760px; }
        20%,100% { width: 0; }
      }
      @keyframes type2 {
        0%,20% { width: 0; }
        34%    { width: 760px; }
        39.8%  { width: 760px; }
        40%,100% { width: 0; }
      }
      @keyframes type3 {
        0%,40% { width: 0; }
        54%    { width: 760px; }
        59.8%  { width: 760px; }
        60%,100% { width: 0; }
      }
      @keyframes type4 {
        0%,60% { width: 0; }
        74%    { width: 760px; }
        79.8%  { width: 760px; }
        80%,100% { width: 0; }
      }
      @keyframes type5 {
        0%,80% { width: 0; }
        94%    { width: 760px; }
        99.8%  { width: 760px; }
        100%   { width: 0; }
      }
    </style>

    <clipPath id="clip1" class="typing">
      <rect x="320" y="188" width="0" height="470"/>
    </clipPath>
    <clipPath id="clip2" class="typing">
      <rect x="320" y="188" width="0" height="470"/>
    </clipPath>
    <clipPath id="clip3" class="typing">
      <rect x="320" y="188" width="0" height="470"/>
    </clipPath>
    <clipPath id="clip4" class="typing">
      <rect x="320" y="188" width="0" height="470"/>
    </clipPath>
    <clipPath id="clip5" class="typing">
      <rect x="320" y="188" width="0" height="470"/>
    </clipPath>
  </defs>

  <!-- outer -->
  <rect x="28" y="28" width="1544" height="844" rx="28" fill="url(#frame)" filter="url(#shadow)"/>

  <!-- top bar -->
  <rect x="28" y="28" width="1544" height="78" rx="28" fill="url(#bar)"/>
  <rect x="28" y="78" width="1544" height="28" fill="url(#bar)"/>

  <circle cx="72" cy="67" r="8" fill="#ffb8c4"/>
  <circle cx="98" cy="67" r="8" fill="#ffe0a6"/>
  <circle cx="124" cy="67" r="8" fill="#d8f4cb"/>

  <text x="800" y="75" text-anchor="middle" class="title">workspace</text>

  <!-- editor -->
  <rect x="64" y="138" width="1472" height="690" rx="22" fill="#000000"/>
  <rect x="64" y="138" width="1472" height="56" rx="22" fill="#0a0a0a"/>
  <rect x="64" y="172" width="1472" height="22" fill="#0a0a0a"/>

  <text x="1480" y="174" text-anchor="end" class="lang">PYTHON · TYPESCRIPT · GO · SQL · BASH</text>

  <!-- left code gutter -->
  <rect x="64" y="194" width="110" height="634" fill="#050505"/>
  <line x1="174" y1="194" x2="174" y2="828" stroke="#161616"/>

  <g>
    <text x="119" y="238" text-anchor="middle" class="line-no">1</text>
    <text x="119" y="286" text-anchor="middle" class="line-no">2</text>
    <text x="119" y="334" text-anchor="middle" class="line-no">3</text>
    <text x="119" y="382" text-anchor="middle" class="line-no">4</text>
    <text x="119" y="430" text-anchor="middle" class="line-no">5</text>
    <text x="119" y="478" text-anchor="middle" class="line-no">6</text>
    <text x="119" y="526" text-anchor="middle" class="line-no">7</text>
    <text x="119" y="574" text-anchor="middle" class="line-no">8</text>
    <text x="119" y="622" text-anchor="middle" class="line-no">9</text>
    <text x="119" y="670" text-anchor="middle" class="line-no">10</text>
  </g>

  <!-- right gif zone -->
  <rect x="1120" y="216" width="360" height="532" rx="18" fill="#050505" stroke="#111111"/>
  <rect x="1144" y="242" width="140" height="220" rx="14" fill="#000000"/>
  <rect x="1316" y="242" width="140" height="220" rx="14" fill="#000000"/>
  <rect x="1144" y="502" width="312" height="212" rx="14" fill="#040404"/>

  <!-- local gifs -->
  <image href="dancer.gif" x="1148" y="246" width="132" height="212" preserveAspectRatio="xMidYMid slice"/>
  <image href="dancer.gif" x="1320" y="246" width="132" height="212" preserveAspectRatio="xMidYMid slice"/>

  <text x="1166" y="536" class="code" style="font-size:20px; fill:#ffdcd2;">now loading visual noise...</text>
  <text x="1166" y="572" class="code" style="font-size:20px;"><tspan class="op">status = { </tspan><tspan class="str">"vibe"</tspan><tspan class="op">: </tspan><tspan class="str">"online"</tspan><tspan class="op"> }</tspan></text>
  <text x="1166" y="608" class="code" style="font-size:20px;"><tspan class="fn">render</tspan><tspan class="op">(</tspan><tspan class="str">"motion"</tspan><tspan class="op">, fps=</tspan><tspan class="num">60</tspan><tspan class="op">)</tspan></text>
  <text x="1166" y="644" class="code" style="font-size:20px;"><tspan class="cm"># black background required</tspan></text>

  <!-- panels -->
  <g class="panel p1">
    <text x="1068" y="238" text-anchor="end" class="lang">PYTHON</text>
    <g clip-path="url(#clip1)">
      <text x="200" y="238" class="code"><tspan class="kw">async def</tspan><tspan class="op"> </tspan><tspan class="fn">orchestrate</tspan><tspan class="op">(workers, queue):</tspan></text>
      <text x="200" y="286" class="code"><tspan class="op">    active = [w </tspan><tspan class="kw">for</tspan><tspan class="op"> w </tspan><tspan class="kw">in</tspan><tspan class="op"> workers </tspan><tspan class="kw">if</tspan><tspan class="op"> w.online]</tspan></text>
      <text x="200" y="334" class="code"><tspan class="op">    batches = await </tspan><tspan class="fn">split_queue</tspan><tspan class="op">(queue, size=</tspan><tspan class="num">50</tspan><tspan class="op">)</tspan></text>
      <text x="200" y="382" class="code"><tspan class="op">    result = await </tspan><tspan class="fn">gather</tspan><tspan class="op">(*[w.run(b) </tspan><tspan class="kw">for</tspan><tspan class="op"> w, b </tspan><tspan class="kw">in</tspan><tspan class="op"> zip(active, batches)])</tspan></text>
      <text x="200" y="430" class="code"><tspan class="op">    stats = {</tspan><tspan class="str">"processed"</tspan><tspan class="op">: </tspan><tspan class="fn">sum</tspan><tspan class="op">(result), </tspan><tspan class="str">"workers"</tspan><tspan class="op">: </tspan><tspan class="fn">len</tspan><tspan class="op">(active)}</tspan></text>
      <text x="200" y="478" class="code"><tspan class="op">    await </tspan><tspan class="fn">save_metrics</tspan><tspan class="op">(stats)</tspan></text>
      <text x="200" y="526" class="code"><tspan class="op">    await </tspan><tspan class="fn">publish_event</tspan><tspan class="op">(</tspan><tspan class="str">"pipeline.synced"</tspan><tspan class="op">, stats)</tspan></text>
      <text x="200" y="574" class="code"><tspan class="op">    </tspan><tspan class="kw">return</tspan><tspan class="op"> stats</tspan></text>
      <text x="200" y="622" class="code"><tspan class="cm"># analytics, queue, and workers are synchronized</tspan></text>
    </g>
    <rect x="955" y="214" width="12" height="28" fill="#ffe8e1" class="cursor"/>
  </g>

  <g class="panel p2">
    <text x="1068" y="238" text-anchor="end" class="lang">TYPESCRIPT</text>
    <g clip-path="url(#clip2)">
      <text x="200" y="238" class="code"><tspan class="kw">type</tspan><tspan class="op"> Job = { id: </tspan><tspan class="typ">number</tspan><tspan class="op">; name: </tspan><tspan class="typ">string</tspan><tspan class="op">; status: </tspan><tspan class="str">"queued"</tspan><tspan class="op"> | </tspan><tspan class="str">"done"</tspan><tspan class="op"> }</tspan></text>
      <text x="200" y="286" class="code"><tspan class="kw">const</tspan><tspan class="op"> queue: Job[] = </tspan><tspan class="fn">loadJobs</tspan><tspan class="op">()</tspan></text>
      <text x="200" y="334" class="code"><tspan class="kw">const</tspan><tspan class="op"> next = queue.find(job =&gt; job.status === </tspan><tspan class="str">"queued"</tspan><tspan class="op">)</tspan></text>
      <text x="200" y="382" class="code"><tspan class="kw">if</tspan><tspan class="op"> (!next) </tspan><tspan class="kw">throw</tspan><tspan class="op"> </tspan><tspan class="kw">new</tspan><tspan class="typ"> Error</tspan><tspan class="op">(</tspan><tspan class="str">"queue is empty"</tspan><tspan class="op">)</tspan></text>
      <text x="200" y="430" class="code"><tspan class="op">next.status = </tspan><tspan class="str">"done"</tspan></text>
      <text x="200" y="478" class="code"><tspan class="kw">await</tspan><tspan class="op"> </tspan><tspan class="fn">persistJobState</tspan><tspan class="op">(next.id, next.status)</tspan></text>
      <text x="200" y="526" class="code"><tspan class="kw">const</tspan><tspan class="op"> pending = queue.filter(job =&gt; job.status !== </tspan><tspan class="str">"done"</tspan><tspan class="op">)</tspan></text>
      <text x="200" y="574" class="code"><tspan class="fn">console.log</tspan><tspan class="op">(</tspan><tspan class="str">"pending jobs"</tspan><tspan class="op">, pending.length)</tspan></text>
      <text x="200" y="622" class="code"><tspan class="cm">// queue persisted and broadcasted to dashboard</tspan></text>
    </g>
    <rect x="980" y="214" width="12" height="28" fill="#ffe8e1" class="cursor"/>
  </g>

  <g class="panel p3">
    <text x="1068" y="238" text-anchor="end" class="lang">GO</text>
    <g clip-path="url(#clip3)">
      <text x="200" y="238" class="code"><tspan class="kw">package</tspan><tspan class="op"> main</tspan></text>
      <text x="200" y="286" class="code"><tspan class="kw">import</tspan><tspan class="op"> (</tspan><tspan class="str">"encoding/json"</tspan><tspan class="op"> </tspan><tspan class="str">"net/http"</tspan><tspan class="op">)</tspan></text>
      <text x="200" y="334" class="code"><tspan class="kw">type</tspan><tspan class="op"> Health struct { Status string; Uptime int }</tspan></text>
      <text x="200" y="382" class="code"><tspan class="kw">func</tspan><tspan class="op"> </tspan><tspan class="fn">health</tspan><tspan class="op">(w http.ResponseWriter, r *http.Request) {</tspan></text>
      <text x="200" y="430" class="code"><tspan class="op">    payload := Health{Status: </tspan><tspan class="str">"ok"</tspan><tspan class="op">, Uptime: </tspan><tspan class="num">86400</tspan><tspan class="op">}</tspan></text>
      <text x="200" y="478" class="code"><tspan class="op">    w.Header().Set(</tspan><tspan class="str">"Content-Type"</tspan><tspan class="op">, </tspan><tspan class="str">"application/json"</tspan><tspan class="op">)</tspan></text>
      <text x="200" y="526" class="code"><tspan class="op">    json.NewEncoder(w).Encode(payload)</tspan></text>
      <text x="200" y="574" class="code"><tspan class="op">}</tspan></text>
      <text x="200" y="622" class="code"><tspan class="cm">// service is healthy and ready for probes</tspan></text>
    </g>
    <rect x="890" y="214" width="12" height="28" fill="#ffe8e1" class="cursor"/>
  </g>

  <g class="panel p4">
    <text x="1068" y="238" text-anchor="end" class="lang">SQL</text>
    <g clip-path="url(#clip4)">
      <text x="200" y="238" class="code"><tspan class="kw">CREATE TABLE</tspan><tspan class="op"> jobs (</tspan></text>
      <text x="200" y="286" class="code"><tspan class="op">    id SERIAL PRIMARY KEY,</tspan></text>
      <text x="200" y="334" class="code"><tspan class="op">    name TEXT NOT NULL,</tspan></text>
      <text x="200" y="382" class="code"><tspan class="op">    status TEXT NOT NULL,</tspan></text>
      <text x="200" y="430" class="code"><tspan class="op">    started_at TIMESTAMP</tspan></text>
      <text x="200" y="478" class="code"><tspan class="op">);</tspan></text>
      <text x="200" y="526" class="code"><tspan class="kw">SELECT</tspan><tspan class="op"> name, status </tspan><tspan class="kw">FROM</tspan><tspan class="op"> jobs </tspan><tspan class="kw">WHERE</tspan><tspan class="op"> status != </tspan><tspan class="str">'done'</tspan><tspan class="op">;</tspan></text>
      <text x="200" y="574" class="code"><tspan class="kw">ORDER BY</tspan><tspan class="op"> started_at DESC;</tspan></text>
      <text x="200" y="622" class="code"><tspan class="cm">-- operational jobs listed for dashboard</tspan></text>
    </g>
    <rect x="760" y="214" width="12" height="28" fill="#ffe8e1" class="cursor"/>
  </g>

  <g class="panel p5">
    <text x="1068" y="238" text-anchor="end" class="lang">BASH</text>
    <g clip-path="url(#clip5)">
      <text x="200" y="238" class="code"><tspan class="op">#!/usr/bin/env bash</tspan></text>
      <text x="200" y="286" class="code"><tspan class="op">set -euo pipefail</tspan></text>
      <text x="200" y="334" class="code"><tspan class="op">echo </tspan><tspan class="str">"building frontend assets..."</tspan></text>
      <text x="200" y="382" class="code"><tspan class="op">npm run build</tspan></text>
      <text x="200" y="430" class="code"><tspan class="op">echo </tspan><tspan class="str">"compiling services..."</tspan></text>
      <text x="200" y="478" class="code"><tspan class="op">cargo build --release</tspan></text>
      <text x="200" y="526" class="code"><tspan class="op">rsync -avz ./dist/ prod:/opt/app/</tspan></text>
      <text x="200" y="574" class="code"><tspan class="op">pm2 restart gateway worker api</tspan></text>
      <text x="200" y="622" class="code"><tspan class="cm"># release is online and healthy</tspan></text>
    </g>
    <rect x="835" y="214" width="12" height="28" fill="#ffe8e1" class="cursor"/>
  </g>
</svg>
